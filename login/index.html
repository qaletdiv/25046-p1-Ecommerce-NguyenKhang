<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - xemohinhtinh</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="login.css">
</head>
<body data-page="login">
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="../home/index.html" aria-label="xemohinhtinh trang chủ">
        <span class="brand-mark">XM</span>
        <span>xemohinhtinh</span>
      </a>

      <button class="nav-toggle" type="button" aria-label="Mở menu" data-menu-toggle>
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="nav-links" data-nav-links>
        <a href="../home/index.html" data-nav="home">Trang chủ</a>
        <a href="../product-list/index.html" data-nav="product-list">Sản phẩm</a>
        <a href="../home/index.html#contact">Liên hệ</a>
        <a href="../login/index.html" data-nav="login">Đăng nhập</a>
        <a href="../sign-up/index.html" data-nav="sign-up">Đăng ký</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="auth-page">
      <div class="auth-copy">
        <p class="eyebrow">Tài khoản</p>
        <h1>Đăng nhập tài khoản</h1>
        <p>Dùng email và mật khẩu đã đăng ký. Sau khi đăng nhập, bạn có thể thêm sản phẩm vào giỏ hàng ở màn hình chi tiết.</p>
      </div>

      <form class="auth-form" data-login-form novalidate>
        <div class="form-field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" name="email" type="email" autocomplete="email" required>
        </div>

        <div class="form-field">
          <label for="loginPassword">Mật khẩu</label>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
        </div>

        <button class="primary-button full" type="submit">Đăng nhập</button>
        <p class="form-message" data-login-message></p>
        <p class="auth-note">Chưa có tài khoản? <a href="../sign-up/index.html">Đăng ký</a></p>
      </form>
    </section>
  </main>

  <script src="../js/mock-data.js"></script>
  <script src="../js/main.js"></script>
  <script src="login.js"></script>
</body>
</html>
